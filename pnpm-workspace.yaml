  handlebars: 4.7.9
  hono: 4.12.25
  micromatch: ^4.0.8
  minimatch@3.1.2: 3.1.4
  minimatch@9.0.5: 9.0.7
  path-to-regexp: 8.4.0
  picomatch@2.3.1: 2.3.2
  picomatch@4.0.3: 4.0.4
  rollup: 4.59.0
  semver: ^7.7.1
